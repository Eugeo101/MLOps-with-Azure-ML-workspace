$schema: https://azuremlschemas.azureedge.net/latest/sweepJob.schema.json
type: sweep
display_name: command_job-diabetes-sweep-mlflow
experiment_name: diabetes-training

# 💡 Move tags to the top level
tags:
  model_type: LogisticRegression

inputs:
  diabetes_data:
    type: uri_file
    path: azureml:diabetes-data:1

search_space:
  reg_rate:
    type: uniform
    min_value: 0.01
    max_value: 1.0

sampling_algorithm: bayesian

early_termination:
  type: bandit
  delay_evaluation: 5
  evaluation_interval: 1
  slack_factor: 0.1

objective:
  goal: maximize
  primary_metric: training_accuracy_score

limits:
  max_total_trials: 10
  max_concurrent_trials: 2
  timeout: 7200

compute: azureml:azure-ml-cluster

# 💡 Clean trial section without 'tags'
trial:
  code: .
  command: python train.py --training_data ${{inputs.diabetes_data}} --reg_rate ${{search_space.reg_rate}}
  environment: azureml:AzureML-sklearn-1.0-ubuntu20.04-py38-cpu@latest